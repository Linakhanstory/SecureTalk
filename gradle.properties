# Force IPv4 to prevent Windows socket connection aborts
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8 -Djava.net.preferIPv4Stack=true -Dsun.io.useCanonCaches=false -Dsun.zip.disableMemoryMapping=true

# Strategy: Run Kotlin compiler IN-PROCESS to avoid socket connections between processes
kotlin.compiler.execution.strategy=in-process

# General stability
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# Disable VFS watching (major cause of "connection aborted" by Antivirus on Windows)
org.gradle.vfs.watch=false

# Re-enable the daemon but with IPv4 enforcement
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.caching=true

# Increase network timeouts for dependency downloads
systemProp.org.gradle.internal.http.connectionTimeout=120000
systemProp.org.gradle.internal.http.socketTimeout=120000
systemProp.http.keepAlive=false
